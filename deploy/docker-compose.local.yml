# Local-testing compose: builds milod from source, uses HTTP-only Caddy.
# Run from the deploy/ directory:
#   docker compose -f docker-compose.local.yml up -d --build

services:
  milo-control-plane:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: milo-control-plane
    restart: unless-stopped
    environment:
      ROOT_DOMAIN: ${ROOT_DOMAIN:-app.test}
      API_DOMAIN: ${API_DOMAIN:-milo.test}
      STATE_DIR: /var/lib/milo
      MILO_NETWORK: milo-net
      GHCR_USER: ${GHCR_USER:-}
      GHCR_TOKEN: ${GHCR_TOKEN:-}
      MILO_VERSION: local
    volumes:
      - milo-state:/var/lib/milo
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - milo-net

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - milo-net

volumes:
  milo-state:
  caddy-data:
  caddy-config:

networks:
  milo-net:
    driver: bridge
    name: milo-net
